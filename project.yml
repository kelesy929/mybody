# XcodeGen 配置。在 macOS（或 CI）上执行 `xcodegen generate` 生成 MyBody.xcodeproj。
# 在 Windows 上开发时不需要它——只管增删 .swift 文件，工程文件由 macOS 侧按此重建。
name: MyBody
options:
  bundleIdPrefix: com.akai.mybody
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  MyBodyCore:
    path: MyBodyCore

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: zh-Hans
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MyBody:
    type: application
    platform: iOS
    sources:
      - path: MyBody
    dependencies:
      - package: MyBodyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akai.mybody
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"                # 仅 iPhone
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: MyBody
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  MyBodyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MyBodyUITests
    dependencies:
      - target: MyBody

# 显式 scheme：测试动作包含 UI 截图测试（覆盖同名自动 scheme）。
schemes:
  MyBody:
    build:
      targets:
        MyBody: all
    test:
      targets:
        - MyBodyUITests
    run:
      config: Debug
